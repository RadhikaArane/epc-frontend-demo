<div class="content">

    <!-- Breadcrumb -->
    <div class="d-md-flex d-block align-items-center justify-content-between mb-3">
    </div>

    <div class="card border">
        <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-start">
            <h3 class="mb-3 mb-md-0">Work Orders & Agreements</h3>
            <div class="">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addProjectModal">Add New Work
                    Order
                </button>
            </div>
        </div>
    </div>

    <!-- Product List Section -->
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header d-flex align-items-center justify-content-between flex-wrap row-gap-3">
                    <h5 class="d-flex align-items-center">Work Orders List</h5>
                    <div class="d-flex align-items-center flex-wrap row-gap-3">
                        <!-- Varirty filter -->
                        <div class="dropdown me-2">
                            <!-- <label>Variety</label> -->
                            <select class="form-select">
                                <option value="">WBS No.</option>
                                <option>WO-10032</option>
                            </select>
                        </div>



                    </div>
                </div>
                <div class="card-body p-0">

                    <div class="custom-datatable-filter ">
                        <div class="dataTables_wrapper dt-bootstrap5 no-footer">
                            <div class=" table-responsive">
                                <table class="table table-striped table-bordered">
                                    <!-- <table datatable [dtOptions]="dtOptions" class="table table-striped"> -->
                                    <thead class="thead-light">
                                        <tr>
                                            <th>Sr No</th>
                                            <th>WBS No</th>
                                            <th>Linked Project</th>
                                            <th>Vendor</th>
                                            <th>Date Issued</th>
                                            <th>Status</th>
                                            <th>Completion Period</th>
                                            <th>Payment Terms</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td>1</td>
                                            <td>WO-10032</td>
                                            <td>NVDA_Batrangi_1 Ch</td>
                                            <td>ABC Vendors Pvt Ltd</td>
                                            <td>2024-12-30</td>
                                            <td><span class="badge bg-info">Active</span></td>
                                            <td>180 days</td>
                                            <td>40% Adv, 60% after delivery</td>
                                            <td>
                                                <button class="btn btn-outline-primary me-2">View</button>
                                                <button class="btn btn-outline-secondary">Edit</button>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>



<div class="modal fade" id="addProjectModal" tabindex="-1" aria-labelledby="addProjectLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="addProjectLabel">Add New Work Order</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <form class="overflow-auto">
                <div class="modal-body">
                    <!-- Row 1 -->
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">WBS No</label>
                            <input type="text" class="form-control" placeholder="">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Linked Project</label>
                            <select class="form-select">
                                <option value="">Project</option>
                                <option>NVDA</option>
                            </select>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">Vendor</label>
                            <input type="text" class="form-control" placeholder="">
                        </div>
                    </div>

                    <!-- Row 2 -->
                    <div class="row g-3 mt-1">
                        <div class="col-md-4">
                            <label class="form-label">Date Issued</label>
                            <input type="date" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Status</label>
                            <select class="form-select">
                                <option value="">Project</option>
                                <option>Active</option>
                                <option>Pending</option>
                                <option>Completed</option>
                                <option>Terminated</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Completion Period</label>
                            <input type="number" value="e.g. 180 days" class="form-control">
                        </div>
                    </div>

                    <!-- Row 3 -->
                    <div class="row g-3 mt-1">
                        
                        <div class="col-md-4">
                            <label class="form-label">Payment Terms</label>
                            <input type="number" class="form-control" min="0" max="100" value="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Penalty/Clauses</label>
                            <input type="number" step="0.01" class="form-control">
                        </div>
                    </div>

                    <!-- Remarks -->
                    <div class="mt-3">
                        <label class="form-label">Remarks</label>
                        <textarea class="form-control" rows="2" placeholder=""></textarea>
                    </div> 
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary ms-2">Add Work Order</button>
                </div>
            </form>
        </div>
    </div>
</div>
