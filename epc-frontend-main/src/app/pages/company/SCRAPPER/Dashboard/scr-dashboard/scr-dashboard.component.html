<div class="content">

    <div class="d-md-flex d-block align-items-center justify-content-between page-breadcrumb mb-3">
        <div class="d-flex my-xl-auto right-content align-items-center flex-wrap">
            <div class="me-0 mb-2">
                <app-breadcrumbs title="Dashboard" [breadcrumbItems]="breadCrumbItems()"></app-breadcrumbs>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body d-flex align-items-center justify-content-between flex-wrap w-100">

            <!-- Left: Welcome -->
            <div class="d-flex align-items-center mb-2 mb-md-0">
                <span class="avatar avatar-xl flex-shrink-0">
                    <img [src]="'assets/img/Mahindra_Project/User-img/user-img.jpg'" alt="Profile"
                        class="img-fluid rounded-circle" style="width:56px;height:56px;object-fit:cover;">
                </span>
                <div class="ms-3">
                    <h3 class="mb-0" style="color:#2c3e50;font-weight:600;">Welcome, {{ userName() }}</h3>
                </div>
            </div>

            <!-- Right: State filter (pushed to end) -->
            <div class="ms-auto d-flex align-items-center">
                <label for="stateSelect" class="mb-0 me-2 fs-16 small text-muted" style="font-weight:500;">State:</label>
                <select id="stateSelect" class="form-select form-select-sm shadow-sm" [formControl]="stateControl"
                    (change)="onStateChange()"
                    style="min-width:220px;border:1px solid #dee2e6;border-radius:8px;padding:.375rem .75rem;">
                    <option value="">All States</option>
                    <option value="AndhraPradesh">Andhra Pradesh</option>
                    <option value="Chhattisgarh">Chhattisgarh</option>
                    <option value="Gujarat">Gujarat</option>
                    <option value="Karnataka_Horti">Karnataka (Horticulture)</option>
                    <option value="Karnataka_Agri">Karnataka (Agriculture)</option>
                    <option value="MadhyaPradesh">Madhya Pradesh</option>
                    <option value="Tamilnadu">Tamil Nadu</option>
                    <option value="Telangana">Telangana</option>
                    <option value="UttarPradesh">Uttar Pradesh</option>
                    <option value="WestBengal">West Bengal</option>
                </select>
            </div>

        </div>
    </div>


    <!-- KPI row -->
    <div class="row g-4 mb-4">
        <div class="col-12 col-lg-6">
            <div class="card border-0 h-100 shadow-sm"
                style="border-radius: 16px; overflow: hidden; transition: transform 0.2s ease, box-shadow 0.2s ease;"
                onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 8px 24px rgba(0,0,0,0.12)'"
                onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 2px 8px rgba(0,0,0,0.08)'">
                <div class="card-body" style="padding: 24px;">
                    <div class="d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-start flex-grow-1">
                            <div class="d-flex align-items-center justify-content-center flex-shrink-0"
                                style="width: 56px; height: 56px; background: linear-gradient(135deg, #0ea81d 0%, #4ceb17 100%); border-radius: 14px; margin-right: 16px; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);">
                                <i class="bi bi-check2-circle" style="font-size: 26px; color: #ffffff;"></i>
                            </div>
                            <div class="flex-grow-1">
                                <div
                                    style="font-size: 13px; color: #6c757d; font-weight: 500; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;">
                                    Finished (Today)
                                </div>
                                <div style="font-size: 32px; font-weight: 700; color: #2c3e50; line-height: 1;">
                                    @if(jobStats()) {
                                        {{ jobStats()?.finished }}
                                    } @else {
                                        <span class="spinner-border spinner-border-sm text-success"></span>
                                    }
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div style="height: 4px; background: linear-gradient(90deg, #0ea81d 0%, #4ceb17 100%);"></div>
            </div>
        </div>

        <div class="col-12 col-lg-6">
            <div class="card border-0 h-100 shadow-sm"
                style="border-radius: 16px; overflow: hidden; transition: transform 0.2s ease, box-shadow 0.2s ease;"
                onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 8px 24px rgba(0,0,0,0.12)'"
                onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 2px 8px rgba(0,0,0,0.08)'">
                <div class="card-body" style="padding: 24px;">
                    <div class="d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-start flex-grow-1">
                            <div class="d-flex align-items-center justify-content-center flex-shrink-0"
                                style="width: 56px; height: 56px; background: linear-gradient(135deg, #a70a0a 0%, #f5576c 100%); border-radius: 14px; margin-right: 16px; box-shadow: 0 4px 12px rgba(245, 87, 108, 0.3);">
                                <i class="bi bi-exclamation-diamond" style="font-size: 26px; color: #ffffff;"></i>
                            </div>
                            <div class="flex-grow-1">
                                <div
                                    style="font-size: 13px; color: #6c757d; font-weight: 500; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">
                                    Failed (Today)
                                </div>
                                <div style="font-size: 32px; font-weight: 700; color: #2c3e50; line-height: 1;">
                                    @if(jobStats()) {
                                            {{ jobStats()?.failed }}
                                        } @else {
                                            <span class="spinner-border spinner-border-sm text-danger"></span>
                                        }
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div style="height: 4px; background: linear-gradient(90deg, #a70a0a 0%, #f5576c 100%);"></div>
            </div>
        </div>
    </div>

    <!-- State Data Overview -->

                <i class="bi bi-geo-alt-fill" style="color: #667eea; margin-right: 8px;"></i>State Data Overview

        </div>

                        onmouseover="this.style.borderColor='#667eea'; this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 12px rgba(102, 126, 234, 0.2)'"
