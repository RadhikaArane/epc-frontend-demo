<div class="content">
  <div class="d-md-flex d-block align-items-center justify-content-between page-breadcrumb mb-3">
    <div class="d-flex my-xl-auto right-content align-items-center flex-wrap">
      <div class="me-0 mb-2">
        <app-breadcrumbs title="Manual Data Upload" [breadcrumbItems]="breadCrumbItems()"></app-breadcrumbs>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header bg-white">
      <h5 class="card-title mb-0">Upload Scrapped Data</h5>
    </div>
    <div class="card-body">
      <div class="row g-3">
        
        <div class="col-md-4">
          <label for="stateSelect" class="form-label fw-semibold">State <span class="text-danger">*</span></label>
          <select id="stateSelect" class="form-select" [value]="selectedState()" 
                  (change)="selectedState.set($any($event.target).value)" [disabled]="isLoading()">
            @for (state of states; track state.value) {
              <option [value]="state.value" [disabled]="state.value === ''">{{ state.label }}</option>
            }
          </select>
        </div>

        <div class="col-md-4">
          <label for="scrapDateInput" class="form-label fw-semibold">Scrap Date <span class="text-danger">*</span></label>
          <input type="date" id="scrapDateInput" class="form-control" [value]="scrapDate()"
                 (change)="scrapDate.set($any($event.target).value)" [disabled]="isLoading()">
        </div>

        <div class="col-md-4">
          <label for="formFile" class="form-label fw-semibold">Data File <span class="text-danger">*</span></label>
          <input class="form-control" type="file" id="formFile" (change)="onFileSelected($event)" 
                 accept=".csv, .xlsx, .xls" [disabled]="isLoading()">
          @if (selectedFile()) {
            <div class="form-text text-success">Selected: {{ selectedFile()?.name }}</div>
          }
        </div>

         <div class="mt-4 p-2 bg-light border-start border-danger border-3 rounded">
        <p class="mb-0 small text-dark">
          <i class="bi bi-info-circle-fill text-danger me-2"></i>
          <strong>Note:</strong> Please ensure you <em>upload all years combined data</em> in the selected file.
        </p>
      </div>

      </div>

      <div class="d-flex justify-content-end mt-4">
        <button class="btn btn-primary position-relative" (click)="onUpload()" 
                [disabled]="isLoading() || !selectedState() || !scrapDate() || !selectedFile()">
          @if (isLoading()) {
            <span class="d-flex align-items-center">
              <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              Uploading...
            </span>
          } @else {
            <span class="d-flex align-items-center">
              <i class="bi bi-cloud-upload me-2"></i>
              Upload Data
            </span>
          }
        </button>
      </div>

    </div>
  </div>
</div>
