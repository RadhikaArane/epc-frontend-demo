<div class="content">
    <!-- Breadcrumb -->
    <div class="d-md-flex d-block align-items-center justify-content-between page-breadcrumb mb-3">
        <div class="d-flex my-xl-auto right-content align-items-center flex-wrap">
            <div class="me-0 mb-2">
                <app-breadcrumbs title="Job Status" [breadcrumbItems]="breadCrumbItems()"></app-breadcrumbs>
            </div>
        </div>
    </div>

    <!-- Header Card -->
    <div class="card mb-3">
        <div class="card-header d-flex align-items-center justify-content-between flex-wrap row-gap-3">
            <h5 class="mb-0">Job Status</h5>
        </div>
    </div>

    <!-- Table -->



    <div class="table-responsive custom-datatable-filter">
        <table class="table table-striped table-bordered mb-0 table-ultra-compact">
            <thead class="thead-light">
                <tr>
                    <th>Sr No.</th>
                    <th>State</th>
                    <th>Status</th>
                    <th>Started At</th>
                    <th>Finished At</th>
                    <th>Excel</th>
                </tr>
            </thead>
            <tbody>
                @for (job of allJobs(); track $index) {
                <tr>
                    <td><strong>{{ $index + 1}}</strong></td>
                    <td><strong>{{ job.State}}</strong></td>
                    <td>{{ job.Status }}</td>
                    <td>{{ job.StartedAt | date: 'yyyy-MM-dd hh:mm:ss a' }}</td>
                    <td>{{ job.FinishedAt | date: 'yyyy-MM-dd hh:mm:ss a' }}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary"
                            (click)="downloadAttachment(job.State)">Download</button>
                    </td>
                </tr>
                }



            </tbody>

        </table>
    </div>

</div>
