<div class="content">
  <div class="d-md-flex d-block align-items-center justify-content-between page-breadcrumb mb-3">
        <div class="d-flex my-xl-auto right-content align-items-center flex-wrap">
            <div class="me-0 mb-2">
                <app-breadcrumbs title="User Logs" [breadcrumbItems]="breadCrumbItems()"></app-breadcrumbs>
            </div>
        </div>
    </div>
  <!-- Header -->
  <div class="card mb-3">
    <div class="card-header d-flex align-items-center flex-nowrap">
      <h5 class="mb-0 text-truncate">Users Logs</h5>

      <!-- Right-aligned quick filter -->
      <div class="ms-auto d-flex align-items-center">
        <label for="userLogFilter" class="mb-0 me-2 small text-muted">Filter by User ID</label>
        <input id="userLogFilter" type="text" class="form-control form-control-sm"
               placeholder="e.g. USR-223" style="min-width:200px;">
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="card">
    <div class="border-0" style="border-radius:12px;">
      <div class="card-body p-3">
        <div class="table-responsive" style="max-height:60vh; overflow:auto;">
          <table class="table table-bordered table-hover align-middle mb-0">
            <thead class="thead-light" style="position:sticky; top:0; z-index:2;">
              <tr>
                <th>Log ID</th>
                <th>Timestamp</th>
                <th>User ID</th>
                <th>Username / Email</th>
                <th>Module / Feature</th>
                <th>Data Reference</th>
                <th>IP Address</th>
                <th>Device Type</th>
                <th>OS / Browser</th>
                <th>Status</th>
                <th class="text-end">Duration (ms)</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>UL-55890</td>
                <td>2025-10-13 09:58:41</td>
                <td>USR-223</td>
                <td>vikram.naidumahindra.com</td>
                <td>Login</td>
                <td>—</td>
                <td>203.112.45.18</td>
                <td>Desktop</td>
                <td>Windows 11 / Chrome 128</td>
                <td><span class="badge bg-success">Success</span></td>
                <td class="text-end">312</td>
              </tr>
              
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
