<!-- Branch Review — Collections (with Month–Year filter on the same row) -->
<div class="card mb-3" style="border-radius:12px; overflow:hidden;"> 
  <!-- Row: Collections title (left) + Month–Year filter (right) -->
  <div class="px-2 pb-4 pt-4 d-flex align-items-center justify-content-between flex-wrap">
    <h3 class="fw-semibold text-dark mb-2 mb-sm-0">Additional PDD Open Market</h3>
    <div class="d-flex align-items-center"> 
      <label for="collectionsMonth" class="small text-muted mb-0 me-2 text-nowrap">Month–Year</label>
      <input id="collectionsMonth" type="month" class="form-control form-control-sm" style="min-width: 170px;">
    </div>
  </div>
  
  <!-- Table -->
  <div class="px-2 pb-2"> 
    <div class="table-responsive" style="overflow-x: auto; position: relative;">
      <table class="table table-striped table-bordered mb-0 align-middle table-ultra-compact">
        <thead class="thead-light">
          <!-- Header -->
          <tr>
            <th rowspan="2" class="text-center" style="font-size: 16px; position: sticky; left: 0; z-index: 3; font-weight: 1000; border-right: 2px solid #dee2e6; box-shadow: 2px 0 5px rgba(0,0,0,0.1);"
            >State</th>
            <th rowspan="2" class="text-center" style="font-size: 16px; position: sticky; left: 0; z-index: 3; font-weight: 1000; border-right: 2px solid #dee2e6; box-shadow: 2px 0 5px rgba(0,0,0,0.1);"
            >Dealer code</th>
            <th rowspan="2" class="text-center" style="font-size: 16px; position: sticky; left: 0; z-index: 3; font-weight: 1000; border-right: 2px solid #dee2e6; box-shadow: 2px 0 5px rgba(0,0,0,0.1);"
            >Dealer Name</th>
            <th colspan="4" class="text-center">PDD-Ageing</th> 
            <th rowspan="2" class="text-center">Grand Total</th>                         
            <th rowspan="2" class="text-center">Remarks</th> 
          </tr>
          <!-- Sub Header's -->
          <tr>
            <th class="text-center">&lt;6M</th>
            <th class="text-center">6M-1Yr</th> 
            <th class="text-center">1Yr-2Yr</th> 
            <th class="text-center">2Yr-3Yr</th> 
          </tr> 
        </thead> 
        <tbody>   
            <!-- Data Rows --> 
            <tr>
              <td style="font-size: 16px; position: sticky; left: 0; z-index: 3; font-weight: 1000; border-right: 2px solid #dee2e6; box-shadow: 2px 0 5px rgba(0,0,0,0.1);">Andhra Pradesh</td>
              <td style="font-size: 16px; position: sticky; left: 0; z-index: 3; font-weight: 1000; border-right: 2px solid #dee2e6; box-shadow: 2px 0 5px rgba(0,0,0,0.1);">-</td>
              <td style="font-size: 16px; position: sticky; left: 0; z-index: 3; font-weight: 1000; border-right: 2px solid #dee2e6; box-shadow: 2px 0 5px rgba(0,0,0,0.1);">-</td>
              <td>-</td><td>-</td><td>-</td><td></td><td></td>
              <td style="min-width: 300px; max-width: 300px; height: 80px; max-height: 80px; overflow-y: auto; white-space: normal; word-break: break-word;"
              > </td>
            </tr>    
            <tr>
              <td style="font-size: 16px; position: sticky; left: 0; z-index: 3; font-weight: 1000; border-right: 2px solid #dee2e6; box-shadow: 2px 0 5px rgba(0,0,0,0.1);">Bihar</td>
              <td style="font-size: 16px; position: sticky; left: 0; z-index: 3; font-weight: 1000; border-right: 2px solid #dee2e6; box-shadow: 2px 0 5px rgba(0,0,0,0.1);">-</td>
              <td style="font-size: 16px; position: sticky; left: 0; z-index: 3; font-weight: 1000; border-right: 2px solid #dee2e6; box-shadow: 2px 0 5px rgba(0,0,0,0.1);">-</td>
              <td>-</td><td>-</td><td>-</td><td></td><td></td><td style="min-width: 300px; max-width: 300px; height: 80px; max-height: 80px; overflow-y: auto; white-space: normal; word-break: break-word;"
              >remark</td>
            </tr> 
            <tr><td style="font-size: 16px; position: sticky; left: 0; z-index: 3; font-weight: 1000; border-right: 2px solid #dee2e6; box-shadow: 2px 0 5px rgba(0,0,0,0.1);">Bihar</td>
              <td style="font-size: 16px; position: sticky; left: 0; z-index: 3; font-weight: 1000; border-right: 2px solid #dee2e6; box-shadow: 2px 0 5px rgba(0,0,0,0.1);">-</td>
              <td style="font-size: 16px; position: sticky; left: 0; z-index: 3; font-weight: 1000; border-right: 2px solid #dee2e6; box-shadow: 2px 0 5px rgba(0,0,0,0.1);">-</td>
              <td>-</td><td>-</td><td>-</td><td></td><td></td><td></td>
            </tr>
        </tbody>

        <tfoot class="table-light" style="background-color: rgba(237, 210, 73, 0.584);">
            <!-- Totals Row -->
            <tr>
                <td style="background-color: rgb(237,210,73); position: sticky; left: 0; z-index: 2; border-right: 2px solid #dee2e6; box-shadow: 2px 0 5px rgba(0,0,0,0.1);"
                ><strong>Grand Total</strong></td>
                <td style="background-color: rgb(237,210,73); position: sticky; left: 0; z-index: 2; border-right: 2px solid #dee2e6; box-shadow: 2px 0 5px rgba(0,0,0,0.1);">-</td>
                <td style="background-color: rgb(237,210,73);position: sticky; left: 0; z-index: 2; border-right: 2px solid #dee2e6; box-shadow: 2px 0 5px rgba(0,0,0,0.1);">-</td>
                <td>-</td><td>-</td><td>-</td><td></td><td></td><td></td>
            </tr>
        </tfoot>
      </table>
    </div>
  </div>
</div>
