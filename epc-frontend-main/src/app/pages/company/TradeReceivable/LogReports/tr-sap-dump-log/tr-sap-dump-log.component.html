<div class="content mb-4">
  <!-- Header -->
  <div class="card mb-3">
    <div class="card-header d-flex align-items-center flex-nowrap">
      <h5 class="mb-0 text-truncate">SAP Dump Logs</h5>

      <!-- Right-aligned quick filter -->
      <div class="ms-auto d-flex align-items-center">
        <label for="auditLogFilter" class="mb-0 me-2 small text-muted">Filter by Log ID</label>
        <input id="auditLogFilter" type="text" class="form-control form-control-sm"
               placeholder="e.g. AL-10245" style="min-width:200px;">
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="card">
    <div class="border-0" style="border-radius:12px;">
      <div class="card-body p-3">
        <div class="table-responsive" style="max-height:60vh; overflow:auto;">
          <table class="table table-bordered table-hover align-middle mb-0">
            <thead class="thead-light" style="position:sticky; top:0; z-index:2;">
              <tr> 
                <th>Log ID</th>
                <th>Filename</th>
                <th>User Name</th>
                <th>User Role</th>
                <th>Timestamp</th>
                <th>Device Info</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>AL-10245</td>
                <td>Dump.xlsx</td>
                <td>Mayur</td>
                <td>Super Admin</td> 
                <td>2025-10-13 09:42:18</td>
                <td>Windows 11 • Chrome 128 (Desktop)</td>
              </tr> 
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
