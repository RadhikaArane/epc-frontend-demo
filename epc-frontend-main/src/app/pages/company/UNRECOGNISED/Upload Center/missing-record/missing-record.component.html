<div class="content container-fluid">
  
  <div class="d-md-flex d-block align-items-center justify-content-between page-breadcrumb mb-3">
    <div class="d-flex my-xl-auto right-content align-items-center flex-wrap w-100 justify-content-between gap-2">
      <div class="me-0">
        <app-breadcrumbs title="Missing Records" [breadcrumbItems]="breadCrumbItems()"></app-breadcrumbs>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-12">
      <div class="card shadow-sm border-0">
        <div class="card-header fw-bold bg-white">Download Missing Records</div>
        <div class="card-body">
          <div class="d-flex gap-3 align-items-center flex-wrap">
            
            <div class="d-flex align-items-center gap-2">
              <label for="selectDate" class="form-label fw-semibold small mb-0" style="white-space: nowrap;">Select-Date : </label>
              <input 
                type="date" 
                id="selectDate" 
                class="form-control form-control-sm" 
                [value]="selectedMissingDate()" 
                (change)="onDateChange($event)" 
                [disabled]="isDownloadingMissing()"
              />
            </div>

            <button
              class="btn btn-primary btn-sm px-4"
              (click)="downloadMissingRecord()"
              [disabled]="!selectedMissingDate() || isDownloadingMissing()"
            >
              @if (isDownloadingMissing()) {
                <span class="spinner-border spinner-border-sm me-2"></span>
                Downloading...
              } @else {
                Download
              }
            </button>
            
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row mt-4">
    <div class="col-12">
      <div class="card shadow-sm border-0">
        <div class="card-header fw-bold bg-white">Upload Missing Records</div>
        <div class="card-body">
          
          <div class="d-flex align-items-end gap-3 flex-wrap">
            
            <div style="max-width: 400px; flex-grow: 1;">
              <label for="excelUpload" class="form-label text-muted small mb-1">Select Excel File (.xlsx, .xls)</label>
              <input
                class="form-control"
                type="file"
                id="excelUpload"
                accept=".xlsx, .xls"
                (change)="onFileChange($event)"
                [disabled]="isUploading()"
                #fileInput
              >
            </div>

            <button
              class="btn btn-danger"
              style="min-width: 150px;"
              (click)="uploadMissingRecordFile(fileInput)"
            >
              @if (isUploading()) {
                <span class="spinner-border spinner-border-sm me-2"></span>
                Uploading...
              } @else {
                Upload File
              }
            </button>
            
          </div>

          @if (selectedFile()) {
            <div class="d-flex align-items-center mt-3 text-danger bg-light p-2 rounded" style="max-width: 400px;">
              <span class="me-auto text-truncate">
                <strong>{{ selectedFile()?.name }}</strong> 
                <span class="text-muted small ms-1">({{ formatFileSize(selectedFile()?.size) }})</span>
              </span>
              <button 
                class="btn btn-sm btn-outline-danger ms-2 border-0" 
                (click)="removeFile(); fileInput.value = ''" 
                [disabled]="isUploading()"
                title="Remove file"
              >
                Remove
              </button>
            </div>
          }

        </div>
      </div>
    </div>
  </div>
  
</div>
