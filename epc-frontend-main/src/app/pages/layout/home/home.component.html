<div [ngClass]="{'mini-sidebar': layoutMode === '2' || sidebarSize==='2'|| layoutMode==='13'|| miniSidebar === true,
  'menu-horizontal': layoutMode === '3' || layoutMode === '4' || layoutMode === '8'|| layoutMode === '14'|| layoutMode === '15',
  'layout-box-mode':layoutWidth === '2','expand-menu':sidebarSize==='3' || expandMenu === true && miniSidebar === true,
  'slide-nav': mobileSidebar === true}"
  style="--primary-rgb-picr : {{dthemeColor}}; --sidebar--rgb-picr : {{selectedColor}}; --topbar--rgb-picr : {{selectedColor1}};  --topbarcolor--rgb-picr : {{horizontalColor}};"
  [class.header-collapse]="isCollapsed">
  <!-- @if (showPreloader && !withoutWrapperPages) {
  <div id="global-loader">
    <span class="page-loader"></span>
  </div>
  } -->
  <div class="main-wrapper ">
    <div class="page-wrapper">

      <app-toast></app-toast>
      <!-- Other content of your app -->


      @if(!withoutWrapperPages) {
      <!-- app-default-header	 -->
      <app-top-nav />

      <!-- /app-default-header -->
      <!-- app-default-sidebar -->
      <app-sidebar />
      <app-confirmation-dialog></app-confirmation-dialog>
      <!-- /app-default-sidebar -->
        <app-offline-network/>
      <router-outlet />

      }
      <!-- <router-outlet></router-outlet> not in work-->
      @if(!withoutWrapperPages && !withoutLayouts ) {
      <!-- <app-theme-settings></app-theme-settings> -->
      }
      <app-footer></app-footer>

    </div>
  </div>
</div>
